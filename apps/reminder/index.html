<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reminder · a Vessel cargo</title>
<!--
  REMINDER — a Vessel cargo (author: l. fontaine)
  The cargo owns its calendar + day panel; app.js renders into the mount
  points below and persists via vessel.storage. Unity via vessel://sdk.css.
-->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="vessel://sdk.css" />
<link rel="stylesheet" href="app.css" />
</head>
<body>
<div class="cargo">
  <div class="app">
    <div class="dd-toolbar">
      <button class="dd-icon-btn" id="btn-prev" title="Previous month"><svg class="vi" viewBox="0 0 24 24"><use href="#vi-chevron-left"/></svg></button>
      <span class="dd-toolbar-title" id="month-label" style="min-width: 132px; text-align: center"></span>
      <button class="dd-icon-btn" id="btn-next" title="Next month"><svg class="vi" viewBox="0 0 24 24"><use href="#vi-chevron-right"/></svg></button>
      <button class="dd-btn dd-btn-ghost dd-btn-sm" id="btn-today">Today</button>
      <div class="spacer" style="flex: 1"></div>
      <button class="dd-btn dd-btn-primary dd-btn-sm" id="btn-new"><svg class="vi" viewBox="0 0 24 24"><use href="#vi-plus"/></svg> New reminder</button>
    </div>

    <div class="rm-cal">
      <div class="rm-dows">
        <div class="rm-dow">Sun</div><div class="rm-dow">Mon</div><div class="rm-dow">Tue</div>
        <div class="rm-dow">Wed</div><div class="rm-dow">Thu</div><div class="rm-dow">Fri</div><div class="rm-dow">Sat</div>
      </div>
      <div class="rm-grid" id="cal-grid"></div>
    </div>

    <div class="rm-panel" id="panel"></div>
  </div>
</div>

<!-- New / edit reminder modal -->
<div class="rm-modal-overlay" id="rm-modal" style="display: none">
  <div class="rm-modal">
    <div class="rm-modal-title" id="rm-modal-title">New reminder</div>
    <label class="rm-f-label">Title</label>
    <input class="dd-input" id="rm-f-title" placeholder="What's the reminder?" />
    <div class="rm-f-grid">
      <div>
        <label class="rm-f-label">Date</label>
        <input class="dd-input" id="rm-f-date" type="date" />
      </div>
      <div>
        <label class="rm-f-label">Time</label>
        <input class="dd-input" id="rm-f-time" type="time" value="09:00" />
      </div>
    </div>
    <label class="rm-f-label">Color</label>
    <div class="rm-f-colors" id="rm-f-colors">
      <button type="button" class="rm-swatch accent" data-color="accent" data-on="1"></button>
      <button type="button" class="rm-swatch success" data-color="success"></button>
      <button type="button" class="rm-swatch warning" data-color="warning"></button>
      <button type="button" class="rm-swatch danger" data-color="danger"></button>
      <button type="button" class="rm-swatch info" data-color="info"></button>
    </div>
    <div class="rm-modal-footer">
      <button class="dd-btn dd-btn-ghost dd-btn-sm" id="rm-f-cancel">Cancel</button>
      <button class="dd-btn dd-btn-primary dd-btn-sm" id="rm-f-save">Add reminder</button>
    </div>
  </div>
</div>

<script src="vessel://sdk-icons.js"></script>
<script src="vessel://sdk.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
